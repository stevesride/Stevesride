<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Pro Evaluator</title>
<style>
:root {
--bg: #121212; --card: #1e1e1e; --green: #00e676; --red: #ff5252; --yellow: #ffd740;
}
body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
.container { width: 100%; max-width: 320px; background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
.header { text-align: center; font-size: 14px; color: #888; margin-bottom: 10px; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
.stat-box { background: #2a2a2a; padding: 10px; border-radius: 8px; text-align: center; }
.stat-val { display: block; font-size: 20px; font-weight: bold; }
.stat-label { font-size: 10px; color: #aaa; text-transform: uppercase; }
input { width: 85%; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #2c2c2c; color: white; font-size: 16px; margin-bottom: 10px; text-align: center; }
.verdict { padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 16px; margin-top: 5px; }
.go { background: var(--green); color: black; }
.caution { background: var(--yellow); color: black; }
.stop { background: var(--red); color: white; }
</style>
</head>
<body>

<div class="container">
<div class="header">OFFER ANALYSIS</div>
<div class="stats-grid">
<div class="stat-box">
<span id="rate-out" class="stat-val">0.00</span>
<span class="stat-label">net profit</span>
</div>
</div>

<input type="number" id="pay" placeholder="$` Total Pay" step="0.01" oninput="runCalc()">
<input type="number" id="miles" placeholder="Total Miles" step="0.1" oninput="runCalc()">

<div id="verdict" class="verdict" style="display:none;">---</div>
</div>

</script>
</body>
</html>
