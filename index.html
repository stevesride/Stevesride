<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Tracker Dashboard</title>
<style>
:root {
--primary: #2c3e50;
--accent: #3498db;
--bg: #f4f7f6;
--card: #ffffff;
}

body {
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background-color: var(--bg);
color: var(--primary);
margin: 0;
padding: 20px;
}

.container {
max-width: 800px;
margin: auto;
}

h1 {
text-align: center;
color: var(--primary);
border-bottom: 2px solid var(--accent);
padding-bottom: 10px;
}

.family-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
gap: 20px;
margin-top: 20px;
}

.member-card {
background: var(--card);
padding: 20px;
border-radius: 12px;
box-shadow: 0 4px 6px rgba(0,0,0,0.1);
transition: transform 0.2s;
}

.member-card:hover {
transform: translateY(-5px);
}

.member-name {
font-size: 1.4rem;
font-weight: bold;
margin-bottom: 10px;
display: flex;
justify-content: space-between;
align-items: center;
}

.status-dot {
height: 12px;
width: 12px;
border-radius: 50%;
display: inline-block;
}

.status-online { background-color: #2ecc71; }
.status-away { background-color: #f1c40f; }

.info-label {
font-size: 0.85rem;
color: #7f8c8d;
margin-top: 10px;
}

.info-value {
font-size: 1rem;
margin-bottom: 5px;
}

.update-btn {
background: var(--accent);
color: white;
border: none;
padding: 8px 12px;
border-radius: 5px;
cursor: pointer;
width: 100%;
margin-top: 15px;
}
</style>
</head>
<body>

<div class="container">
<h1>Family Daily Tracker</h1>

<div class="family-grid">
<div class="member-card">
<div class="member-name">
Karina
<span class="status-dot status-online"></span>
</div>
<div class="info-label">Current Status</div>
<div class="info-value">At Home</div>
<div class="info-label">Last Updated</div>
<div class="info-value">10:15 AM</div>
<button class="update-btn" onclick="updateStatus('Karina')">Update Status</button>
</div>

<div class="member-card">
<div class="member-name">
Jake
<span class="status-dot status-away"></span>
</div>
<div class="info-label">Current Status</div>
<div class="info-value">At Work / School</div>
<div class="info-label">Last Updated</div>
<div class="info-value">08:30 AM</div>
<button class="update-btn" onclick="updateStatus('Jake')">Update Status</button>
</div>

<div class="member-card">
<div class="member-name">
Esther
<span class="status-dot status-online"></span>
</div>
<div class="info-label">Current Status</div>
<div class="info-value">Out Running Errands</div>
<div class="info-label">Last Updated</div>
<div class="info-value">09:45 AM</div>
<button class="update-btn" onclick="updateStatus('Esther')">Update Status</button>
</div>
</div>
</div>

<script>
function updateStatus(name) {
const newStatus = prompt("Enter new status for " + name + ":");
if (newStatus) {
alert(name + " status updated to: " + newStatus);
// Note: In a real app, you would send this to a database.
// For now, this is a visual template.
}
}
</script>

</body>
</html>
